name: Tend
options:
  bundleIdPrefix: com.harshalmehta.tend
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.0"
    ENABLE_PREVIEWS: YES
targets:
  Tend:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tend
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Tend
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Automatic
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.harshalmehta.tend
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: MB97Z2R567
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
